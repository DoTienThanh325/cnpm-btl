services:
  mysql:
    image: mysql:8.4
    container_name: sms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: sms
      MYSQL_USER: sms
      MYSQL_PASSWORD: sms
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "sms", "-psms"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  app:
    build: .
    container_name: sms-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SMS_DB_HOST: mysql
      SMS_DB_PORT: 3306
      SMS_DB_NAME: sms
      SMS_DB_USER: sms
      SMS_DB_PASSWORD: sms
      DISPLAY: ${DISPLAY:-:0}
      XAUTHORITY: /root/.Xauthority
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-${HOME}/.Xauthority}:/root/.Xauthority:ro

volumes:
  mysql_data:
